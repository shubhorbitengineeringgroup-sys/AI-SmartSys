<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI SmartSyS</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect trick (spa-github-pages standard).
      // When GitHub Pages returns a 404 for unknown paths (e.g. /admin, /faq),
      // this script encodes the path as a query string and redirects to /,
      // where the restore script in index.html rewrites the URL back.
      // segmentCount = 0 means the site is deployed at the root domain (no repo subfolder).
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
